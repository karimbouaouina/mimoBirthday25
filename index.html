<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A cute 8-bit birthday arcade room with a slot machine opening."
    />
    <title>Birthday Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="pixel-sky" aria-hidden="true">
      <span style="--x: 8%; --y: 16%; --d: 0s"></span>
      <span style="--x: 28%; --y: 8%; --d: 0.6s"></span>
      <span style="--x: 55%; --y: 13%; --d: 1s"></span>
      <span style="--x: 78%; --y: 9%; --d: 1.5s"></span>
      <span style="--x: 91%; --y: 24%; --d: 0.3s"></span>
    </div>

    <main>
      <section class="slot-gate" id="slot-gate" aria-labelledby="slot-title">
        <div class="slot-machine">
          <div class="slot-top">
            <span class="slot-light"></span>
            <h1 id="slot-title">Birthday Jackpot</h1>
            <span class="slot-light"></span>
          </div>

          <div class="slot-screen">
            <p class="eyebrow">Insert 3 lucky spins</p>
            <div class="reels" aria-label="Slot machine reels">
              <div class="reel" id="reel-1">07</div>
              <div class="reel" id="reel-2">14</div>
              <div class="reel" id="reel-3">21</div>
            </div>
            <p class="slot-message" id="slot-message">
              Spin until the machine lands on 25 / 25 / 25.
            </p>
            <button class="big-button" id="spin-button" type="button">Spin Spin Spin</button>
          </div>

          <div class="slot-base">
            <div class="coin-slot" aria-hidden="true"></div>
            <p><span>Prize Door</span><strong>Locked</strong></p>
            <div class="lever" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="arcade-room is-hidden" id="arcade-room" aria-labelledby="room-title">
        <header class="room-header">
          <div>
            <p class="eyebrow">Level 25 unlocked</p>
            <h1 id="room-title">Happy Birthday, Player 2</h1>
          </div>
          <div class="status-bar" aria-label="Arcade progress">
            <div><span>Tickets</span><strong id="ticket-count">00</strong></div>
            <div><span>Rewards</span><strong id="reward-count">0/8</strong></div>
            <button class="icon-button" id="sound-toggle" type="button" aria-label="Toggle sound">
              <span aria-hidden="true">♪</span>
            </button>
          </div>
        </header>

        <div class="room-stage">
          <div class="wall-sign">
            <span>25</span>
            <p>Birthday Arcade</p>
            <span>25</span>
          </div>
          <button class="room-nav room-nav-left" id="room-left" type="button" aria-label="Go left">◀</button>
          <div class="room-viewport" id="room-viewport">
            <section class="room-floor" id="room-floor" aria-label="Explore arcade room">
              <button class="station station-heart" type="button" data-station="heart">
                <span class="cabinet-art heart-art" data-mark="♥"></span>
                <strong>Heart Catch</strong>
                <small>Win 25 hearts</small>
              </button>

              <button class="station station-mail" type="button" data-station="mail">
                <span class="cabinet-art letter-art" data-mark="✉"></span>
                <strong>Love Mail</strong>
                <small>Open letters</small>
              </button>

              <button class="station station-coupon" type="button" data-station="coupons">
                <span class="cabinet-art coupon-art" data-mark="券"></span>
                <strong>Coupon Booth</strong>
                <small>Redeem tickets</small>
              </button>

              <button class="station station-plush" type="button" data-station="plush">
                <span class="cabinet-art stitch-art" data-mark="S"></span>
                <strong>Plush Claw</strong>
                <small>Special prize</small>
              </button>

              <button class="station station-whack" type="button" data-station="whack">
                <span class="cabinet-art whack-art" data-mark="♥"></span>
                <strong>Whack-a-Heart</strong>
                <small>Tap 25 hearts</small>
              </button>

              <button class="station station-photo" type="button" data-station="photo">
                <span class="cabinet-art photo-art" data-mark="▣"></span>
                <strong>Photo Booth</strong>
                <small>Framed picture</small>
              </button>

              <button class="station station-memory" type="button" data-station="memory">
                <span class="cabinet-art memory-art" data-mark="✦"></span>
                <strong>Memory Quest</strong>
                <small>Tiny promises</small>
              </button>

              <button class="station station-final locked" type="button" data-station="final">
                <span class="cabinet-art trophy-art" data-mark="★"></span>
                <strong>Final Prize</strong>
                <small id="final-lock">Locked</small>
              </button>

              <div class="room-player" id="room-player" aria-hidden="true">
                <span class="bow"></span>
              </div>
            </section>
          </div>
          <button class="room-nav room-nav-right" id="room-right" type="button" aria-label="Go right">▶</button>
        </div>
      </section>
    </main>

    <dialog class="arcade-dialog" id="arcade-dialog">
      <form method="dialog">
        <button class="close-button" aria-label="Close">x</button>
      </form>
      <p class="eyebrow" id="dialog-kicker">Arcade prize</p>
      <h2 id="dialog-title">Title</h2>
      <div id="dialog-body"></div>
    </dialog>

    <canvas id="confetti" aria-hidden="true"></canvas>
    <script src="script.js"></script>
  </body>
</html>
